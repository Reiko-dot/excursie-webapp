<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Duitsland Excursie</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#160029">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Excursie">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Work+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app">

        <!-- OFFLINE / FOUT MELDING -->
        <div class="status-banner" id="statusBanner" hidden></div>

        <!-- HEADER -->
        <header class="app-header">
            <div class="row">
                <span class="spark">
                    <svg width="20" height="20" viewBox="0 0 24 24">
                        <path d="M12 0 L14.5 9.5 L24 12 L14.5 14.5 L12 24 L9.5 14.5 L0 12 L9.5 9.5 Z" fill="#D44D5C" />
                    </svg>
                </span>
                <div>
                    <div class="brand-title" id="brandTitle">&nbsp;</div>
                    <div class="brand-sub" id="brandSub">&nbsp;</div>
                </div>
            </div>
            <div class="page-label" id="pageLabel">&nbsp;</div>
            <div class="page-title" id="pageTitle">&nbsp;</div>
        </header>

        <!-- CONTENT -->
        <main class="app-content">

            <!-- HOME -->
            <section class="view active" id="view-home">
                <div class="hero">
                    <div class="hero-eyebrow" id="heroEyebrow">&nbsp;</div>
                    <div class="hero-title" id="heroTitle">&nbsp;</div>
                    <p class="hero-desc" id="heroDesc">&nbsp;</p>
                    <div class="stamp">
                        <div class="stamp-inner" id="stampInner">&nbsp;</div>
                    </div>
                </div>

                <div class="facts-strip" id="factsStrip">
                    <!-- gevuld door app.js met data uit exc_quick_facts -->
                </div>

                <div class="section-heading">
                    <span class="spark"><svg width="12" height="12" viewBox="0 0 24 24">
                            <path d="M12 0 L14.5 9.5 L24 12 L14.5 14.5 L12 24 L9.5 14.5 L0 12 L9.5 9.5 Z"
                                fill="#773344" />
                        </svg></span>
                    <span id="whyHeading">&nbsp;</span>
                </div>
                <p style="font-size:13px; line-height:1.6; color:#3a2530; margin-bottom:8px;" id="whyText">&nbsp;</p>

                <div class="section-heading" id="quickNavHeading">&nbsp;</div>
                <div class="shortcut-grid" id="shortcutGrid">
                    <!-- gevuld door app.js met data uit exc_shortcuts -->
                </div>
            </section>

            <!-- BEZIENSWAARDIGHEDEN -->
            <section class="view" id="view-sights">
                <div id="sightsList">
                    <!-- gevuld door app.js met data uit exc_items (category = sight) -->
                </div>
            </section>

            <!-- ACTIVITEITEN & TIPS -->
            <section class="view" id="view-activities">
                <div id="activitiesList">
                    <!-- gevuld door app.js met data uit exc_items (category = activity) -->
                </div>
                <div class="placeholder-note" id="noteActivities">&nbsp;</div>
            </section>

            <!-- PRAKTISCH -->
            <section class="view" id="view-practical">

                <div class="section-heading" id="headingMap">&nbsp;</div>
                <div class="map-wrap">
                    <iframe id="mapFrame" src="" loading="lazy" allowfullscreen></iframe>
                    <a class="map-caption map-link" id="mapLink" href="#" target="_blank" rel="noopener">&nbsp;</a>
                </div>

                <div class="section-heading" id="headingHeenreis">&nbsp;</div>
                <ul class="info-list" id="heenreisList"></ul>

                <div class="section-heading" id="headingOv">&nbsp;</div>
                <div id="transitRows"></div>
                <ul class="info-list" style="margin-top:8px;" id="ovTicketsList"></ul>

                <div class="section-heading" id="headingEmergency">&nbsp;</div>
                <div class="emergency-card" id="emergencyCard"></div>

                <div class="section-heading" id="headingKnow">&nbsp;</div>
                <ul class="info-list" id="knowList"></ul>

                <div class="placeholder-note" id="notePractical">&nbsp;</div>

            </section>

        </main>

        <!-- BOTTOM NAV -->
        <nav class="bottom-nav">
            <button class="nav-btn active" data-view="home" onclick="goTo('home')">
                <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 11l9-8 9 8" />
                    <path d="M5 10v10h14V10" />
                </svg>
                <span id="navHome">Home</span>
            </button>
            <button class="nav-btn" data-view="sights" onclick="goTo('sights')">
                <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 18l6-8 4 5 3-4 5 7z" />
                    <circle cx="8" cy="8" r="2" />
                </svg>
                <span id="navSights">Bezienswaardig.</span>
            </button>
            <button class="nav-btn" data-view="activities" onclick="goTo('activities')">
                <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2l2.6 6.4L21 9l-5 4.3L17.4 20 12 16.6 6.6 20 8 13.3 3 9l6.4-.6z" />
                </svg>
                <span id="navActivities">Activiteiten</span>
            </button>
            <button class="nav-btn" data-view="practical" onclick="goTo('practical')">
                <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 20l-5-2V4l5 2 6-2 5 2v14l-5-2-6 2z" />
                    <path d="M9 6v14M15 4v14" />
                </svg>
                <span id="navPractical">Praktisch</span>
            </button>
        </nav>

    </div>

    <script src="app.js"></script>
</body>

</html>
